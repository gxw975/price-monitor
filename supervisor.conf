[supervisord]
logfile=/home/lab-admin/price-monitor/logs/supervisord.log
pidfile=/tmp/supervisord_price_monitor.pid
nodaemon=true

[unix_http_server]
file=/tmp/supervisor_price_monitor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor_price_monitor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:fastapi-backend]
command=/home/lab-admin/price-monitor/.venv/bin/python3 -m uvicorn main:app --host 127.0.0.1 --port 3001
directory=/home/lab-admin/price-monitor/src
autostart=true
autorestart=true
startsecs=3
stopasgroup=true
killasgroup=true
stderr_logfile=/home/lab-admin/price-monitor/logs/fastapi-backend.log
stdout_logfile=/home/lab-admin/price-monitor/logs/fastapi-backend.log
environment=PYTHONPATH="/home/lab-admin/price-monitor/src"

[program:nextjs-frontend]
command=/home/lab-admin/price-monitor/node_modules/.bin/next start -p 3000
directory=/home/lab-admin/price-monitor
autostart=true
autorestart=true
startsecs=5
stopasgroup=true
killasgroup=true
stderr_logfile=/home/lab-admin/price-monitor/logs/nextjs-frontend.log
stdout_logfile=/home/lab-admin/price-monitor/logs/nextjs-frontend.log
environment=NODE_ENV=production
